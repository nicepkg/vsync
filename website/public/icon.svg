<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vibeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- Indigo 500 -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- Purple 500 -->
      <stop offset="100%" stop-color="#ec4899" /> <!-- Pink 500 -->
    </linearGradient>
  </defs>

  <!-- Left Arm: Solid Source -->
  <path
    d="M 56 56 L 128 216"
    stroke="url(#vibeGradient)"
