  <!-- Right Arm: Segmented Targets (Sync Pulse) -->
  <!-- Segment 1: Base -->
  <path
    d="M 128 216 L 146 176"
    stroke="url(#vibeGradient)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Segment 2: Mid -->
  <path
    d="M 155 156 L 173 116"
    stroke="url(#vibeGradient)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Segment 3: Tip -->
  <path
    d="M 182 96 L 200 56"
    stroke="url(#vibeGradient)"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
