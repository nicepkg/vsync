name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # use github-api mode for more stable: better for protected branches/permissions, tag/commit is also more "official"
          commitMode: github-api
  
          # calculate version + generate changelog + update lockfile (very important)
          version: pnpm version-packages
  
          # build before publish (to avoid empty dist)
          # then publish (you currently use pnpm publish -r)
          # then tag (to allow action to push tags + create GitHub Releases)
          publish: pnpm --filter vibe-sync run build && pnpm ci:publish && pnpm changeset tag
  
          # explicitly enable GitHub Releases
          createGithubReleases: true
  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
